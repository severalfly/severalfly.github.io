---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y年%m月%d日" }}
      </time>
      {% if page.category %}
      <span class="post-category">
        <span class="card-tag">{{ page.category }}</span>
      </span>
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<style>
  .post {
    max-width: 800px;
    margin: 0 auto;
  }

  .post-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--border);
  }

  .post-title {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  .post-content {
    font-size: 1.1rem;
    line-height: 1.8;
  }

  .post-content p {
    margin-bottom: 1.5rem;
  }

  .post-content h1 {
    font-size: 2rem;
    margin-top: 2.5rem;
    margin-bottom: 1rem;
  }

  .post-content h2 {
    font-size: 1.75rem;
    margin-top: 2rem;
    margin-bottom: 1rem;
  }

  .post-content h3 {
    font-size: 1.5rem;
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
  }

  .post-content ul,
  .post-content ol {
    margin-bottom: 1.5rem;
  }

  .post-content li {
    margin-bottom: 0.75rem;
  }

  @media (max-width: 768px) {
    .post-title {
      font-size: 2rem;
    }

    .post-content {
      font-size: 1rem;
    }
  }
</style>
